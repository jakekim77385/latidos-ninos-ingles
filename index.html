<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Latidos Niños — Aprende matemáticas con juegos divertidos. Plataforma educativa para niños en Panamá." />
  <title>Latidos Niños — ¡Aprende Matemáticas!</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .hero-section {
      text-align: center;
      padding: 20px 0 32px;
    }
    .hero-title {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      color: var(--text-dark);
      margin: 12px 0 6px;
    }
    .hero-tagline {
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--text-mid);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="main-content">
    <div class="container">

      <div class="hero-section">
        <div style="display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; margin-bottom:16px;">
          <img src="assets/LATIDOS.png" alt="Fundación Latidos"
               style="width:min(200px,45vw); mix-blend-mode:multiply;" />
          <div style="width:2px; height:80px; background:rgba(0,0,0,0.1); border-radius:2px;"></div>
          <img src="assets/Heartitude_transparent.png" alt="Heartitude"
               style="width:min(160px,38vw);" />
        </div>
        <h1 class="hero-title">¡Aprende con <span style="color:var(--coral);">Latidos</span> Niños!</h1>
        <p class="hero-tagline">El lugar donde las matemáticas son una aventura 🚀</p>
      </div>

      <h2 class="section-title">📚 Elige tu aventura</h2>
      <div class="module-grid">
        <a href="pages/numbers.html" class="module-card coral" id="card-numbers">
          <span class="module-icon">🔢</span>
          <div class="module-title">Números</div>
          <div class="module-subtitle">Contar, comparar y reconocer</div>
        </a>
        <a href="pages/operations.html" class="module-card yellow" id="card-ops">
          <span class="module-icon">🎮</span>
          <div class="module-title">Operaciones</div>
          <div class="module-subtitle">Suma · Resta · Mult · Div</div>
        </a>
        <a href="pages/tables.html" class="module-card green" id="card-tables">
          <span class="module-icon">✖️</span>
          <div class="module-title">Tablas</div>
          <div class="module-subtitle">Memoriza la tabla · Bingo</div>
        </a>
        <a href="pages/rewards.html" class="module-card purple" id="card-rewards">
          <span class="module-icon">🏆</span>
          <div class="module-title">Premios</div>
          <div class="module-subtitle">Medallas y logros</div>
        </a>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/sounds.js"></script>
  <script>
    App.initPage('home');
    // 프로필 없으면 자동 생성 (이름 입력 불필요)
    if (App.getProfiles().length === 0) {
      App.addProfile('Jugador', 'bunny');
    }
  </script>
</body>
</html>
